<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemoteLOCK 導入チェックリスト</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

        :root {
            --brand-navy: #215387;
            --brand-light-blue: #eef8ff;
            --brand-accent: #d7f0ff;
            --brand-danger: #ea4d3c;
            --brand-text: #1e293b;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
            color: var(--brand-text);
        }

        .font-black-jp { font-weight: 900; }

        .progress-transition { transition: width 0.8s cubic-bezier(0.65, 0, 0.35, 1); }

        .glass-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .card-shadow {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }

        .sticky-report-bar {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 -10px 30px -5px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(12px);
        }

        .modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }

        .host-input {
            font-weight: 700;
            font-size: 1.125rem;
            color: #334155;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .host-input:focus {
            background-color: #fff;
            border-color: var(--brand-navy);
            box-shadow: 0 0 0 4px rgba(33, 83, 135, 0.05);
            outline: none;
        }

        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .pill-badge {
            border: 1px solid #e2e8f0;
            border-radius: 9999px;
            background: white;
        }

        .deployment-btn {
            background-color: var(--brand-navy);
            border-radius: 9999px;
            color: white;
            font-weight: 900;
            transition: all 0.2s;
        }

        /* 完了済みタスクのアクションエリアを確実に非表示 */
        .task-action-area {
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.3s ease;
        }
        .task-action-area.visible {
            max-height: 600px;
            opacity: 1;
        }
        .task-action-area.hidden-area {
            max-height: 0;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    window.lucide.createIcons({ nodes: [ref.current] });
                }
            }, [name]);
            return <i ref={ref} data-lucide={name} style={{ width: size, height: size, display: 'inline-block' }} className={className}></i>;
        };

        const STORAGE_KEY_TASKS = 'remotelock_intro_checklist_v1';
        const STORAGE_KEY_FORM  = 'remotelock_intro_form_v1';

        const initialTasks = [
            // ─── STEP 01: 事前確認・取付診断 ───────────────────────────────
            {
                id: 1, phase: 1,
                title: '事前確認チェックリスト(PDF)の確認',
                completed: false,
                description: '設置環境のセルフチェックシートです。公式PDFをご確認ください。',
                links: [{ label: '公式チェックリストを確認', url: 'https://remotelock.kke.co.jp/hubfs/manuals/Checklist_RemoteLOCK500i.pdf' }]
            },
            {
                id: 2, phase: 1,
                title: '取り付け診断の申し込み',
                completed: false,
                description: '公式ページのフォームより写真または図面を送付し、設置診断を受けてください。',
                inquiryLinks: [
                    { label: '写真で診断を依頼', url: 'https://remotelock.kke.co.jp/installation/#photo', icon: 'camera' },
                    { label: '図面で診断を依頼', url: 'https://remotelock.kke.co.jp/installation/#drawing', icon: 'file-text' }
                ]
            },
            {
                id: 3, phase: 1,
                title: '取付診断結果の報告',
                completed: false,
                description: '公式診断の結果（設置可能・不可）を民泊管理バンクへ報告してください。報告後にタスク完了となります。',
                isCritical: true,
                showDiagnosisButtons: true
            },

            // ─── STEP 02: 購入・施工 ────────────────────────────────────────
            {
                id: 4, phase: 2,
                title: 'RemoteLOCK 本体の購入',
                completed: false,
                description: '公式ストアまたは提携店よりご購入ください。',
                links: [{ label: '公式サイトで確認', url: 'https://remotelock.kke.co.jp/products/remotelock-500i/' }]
            },
            {
                id: 5, phase: 2,
                title: '施工工事の依頼',
                completed: false,
                isOptional: true,
                description: 'ご自身で手配いただくか、提携施工パートナーへご依頼ください。',
                links: [{ label: '施工パートナー一覧', url: 'https://remotelock.kke.co.jp/installation/' }]
            },
            {
                id: 6, phase: 2,
                title: 'Wi-Fi環境の整備',
                completed: false,
                description: '扉付近で 2.4GHz Wi-Fi が安定して届くことを確認してください。'
            },

            // ─── STEP 03: クラウド設定・権限共有 ───────────────────────────
            {
                id: 7, phase: 3,
                title: 'RemoteLOCKアカウントの作成',
                completed: false,
                description: 'Connect へアクセスしアカウントを作成します。',
                links: [{ label: 'Connectログイン', url: 'https://connect.remotelock.jp/sign-in' }]
            },
            {
                id: 8, phase: 3,
                title: 'ビジネススタンダードプランの選択',
                completed: false,
                isCritical: true,
                description: '外部システム連携にはビジネススタンダードプランが必須となります。'
            },
            {
                id: 9, phase: 3,
                title: '弊社アカウントを管理者に招待',
                completed: false,
                description: '民泊管理バンクによる設定代行・サポートのため、招待が必要です。',
                showInviteGuide: true
            }
        ];

        const phaseLabels = {
            1: '事前確認・取付診断',
            2: '購入・施工',
            3: 'クラウド設定・権限共有'
        };

        const App = () => {
            const [tasks, setTasks] = useState(() => {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY_TASKS);
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        // initialTasks をベースに saved の completed 状態を反映（構造崩れ防止）
                        return initialTasks.map(t => {
                            const found = parsed.find(p => p.id === t.id);
                            return found ? { ...t, completed: found.completed } : t;
                        });
                    }
                } catch (e) {}
                return initialTasks;
            });

            const [formData, setFormData] = useState(() => {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY_FORM);
                    if (saved) return JSON.parse(saved);
                } catch (e) {}
                return { propertyName: '', subscriberName: '', staffName: '', email: '', loginId: '', password: '' };
            });

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [toastMsg, setToastMsg]       = useState('');

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY_TASKS, JSON.stringify(tasks.map(t => ({ id: t.id, completed: t.completed }))));
            }, [tasks]);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY_FORM, JSON.stringify(formData));
            }, [formData]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [tasks]);

            const progress  = Math.round((tasks.filter(t => t.completed).length / tasks.length) * 100);
            const isAllDone = tasks.every(t => t.completed);

            const toggleTask = (id) => {
                setTasks(prev => prev.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
            };

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text).catch(() => {
                    const el = document.createElement('textarea');
                    el.value = text;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                });
                showToast('コピーしました');
            };

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 2000);
            };

            const handleSendEmail = (type, diagnosisResult = null) => {
                const isFinal = type === 'final';
                const subject = encodeURIComponent(
                    isFinal
                        ? `【導入完了報告】RemoteLOCK 設定完了 (${formData.propertyName})`
                        : `【診断報告】RemoteLOCK 取付診断結果報告 (${formData.propertyName})`
                );

                let body = `民泊管理バンク カスタマーサポート様\n\n` +
                           `RemoteLOCKの導入状況について報告いたします。\n\n` +
                           `■ホスト様情報\n` +
                           `物件名: ${formData.propertyName || '未入力'}\n` +
                           `契約者名: ${formData.subscriberName || '未入力'}\n` +
                           `担当者名: ${formData.staffName || '未入力'}\n` +
                           `連絡先: ${formData.email || '未入力'}\n\n`;

                if (isFinal) {
                    body += `■ログイン情報\n` +
                            `ID: ${formData.loginId || '未入力'}\n` +
                            `PASS: ${formData.password || '未入力'}\n\n` +
                            `ご確認と連携作業をお願いいたします。`;
                } else {
                    const res = diagnosisResult ? '設置可能' : '設置不可';
                    body += `取付診断の結果、公式診断フォームより「${res}」との回答を受け取りました。\n\n`;
                    if (!diagnosisResult) {
                        body += `※設置不可のため、別途メールにて代替品等の今後の対応についてご案内させていただきます。\n`;
                    }
                    setTasks(prev => prev.map(t => t.id === 3 ? { ...t, completed: true } : t));
                }

                window.location.href = `mailto:customer@bizpato.com?subject=${subject}&body=${encodeURIComponent(body)}`;
                if (isFinal) setIsModalOpen(false);
            };

            return (
                <div className="min-h-screen pb-48">

                    {/* ── Header ── */}
                    <header className="sticky top-0 z-40 glass-header border-b border-slate-200">
                        <div className="max-w-4xl mx-auto px-4 py-6 md:py-8 flex flex-col md:flex-row md:items-center justify-between gap-6">
                            <div className="flex items-center gap-5">
                                <div className="bg-[#215387] p-3 rounded-[18px] shadow-lg shadow-blue-900/10 shrink-0">
                                    <Icon name="key" size={28} className="text-white" />
                                </div>
                                <div>
                                    <h1 className="text-2xl md:text-3xl font-black-jp text-slate-800 tracking-tight leading-none mb-2">
                                        RemoteLOCK 導入チェックリスト
                                    </h1>
                                    <p className="text-slate-500 font-bold text-[11px] md:text-xs tracking-tight">
                                        民泊管理バンク・ホスト様用タスク管理シート
                                    </p>
                                </div>
                            </div>

                            <div className="pill-badge px-6 py-2 flex items-center gap-6 shadow-sm min-w-[240px]">
                                <div className="text-[10px] font-black text-slate-300 uppercase tracking-widest leading-none">Task Completion</div>
                                <span className="text-[#215387] font-black text-xl w-12 text-right leading-none">{progress}%</span>
                            </div>
                        </div>

                        {/* Progress Bar */}
                        <div className="h-1 bg-slate-100">
                            <div
                                className="h-full bg-[#215387] progress-transition"
                                style={{ width: `${progress}%` }}
                            />
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 md:p-8 space-y-12 mt-6">

                        {/* ── Host Info Card ── */}
                        <div className="bg-white rounded-[32px] shadow-sm border border-slate-200 overflow-hidden card-shadow">
                            <div className="bg-white px-10 py-6 border-b border-slate-50 flex justify-between items-center">
                                <h2 className="text-slate-700 font-black-jp text-lg flex items-center gap-3">
                                    <Icon name="user" size={20} className="text-[#215387]" /> ホスト様情報
                                </h2>
                                <span className="text-slate-400 text-[10px] font-black tracking-widest uppercase">Required Info</span>
                            </div>
                            <div className="p-10 space-y-8">
                                <div>
                                    <label className="block text-[11px] font-black text-slate-400 mb-2 uppercase tracking-widest leading-none">物件名</label>
                                    <input
                                        type="text"
                                        value={formData.propertyName}
                                        onChange={e => setFormData({ ...formData, propertyName: e.target.value })}
                                        className="host-input w-full rounded-2xl px-6 py-5"
                                        placeholder="例：〇〇マンション 101号室"
                                    />
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div>
                                        <label className="block text-[11px] font-black text-slate-400 mb-2 uppercase tracking-widest leading-none">ご契約者様名</label>
                                        <input
                                            type="text"
                                            value={formData.subscriberName}
                                            onChange={e => setFormData({ ...formData, subscriberName: e.target.value })}
                                            className="host-input w-full rounded-2xl px-6 py-5"
                                            placeholder="個人名または会社名"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-[11px] font-black text-slate-400 mb-2 uppercase tracking-widest leading-none">担当者名</label>
                                        <input
                                            type="text"
                                            value={formData.staffName}
                                            onChange={e => setFormData({ ...formData, staffName: e.target.value })}
                                            className="host-input w-full rounded-2xl px-6 py-5"
                                            placeholder="ご担当者様名"
                                        />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-[11px] font-black text-slate-400 mb-2 uppercase tracking-widest leading-none">連絡先メールアドレス</label>
                                    <input
                                        type="email"
                                        value={formData.email}
                                        onChange={e => setFormData({ ...formData, email: e.target.value })}
                                        className="host-input w-full rounded-2xl px-6 py-5"
                                        placeholder="example@minpaku.com"
                                    />
                                </div>
                            </div>
                        </div>

                        {/* ── Steps & Tasks ── */}
                        {[1, 2, 3].map(phase => (
                            <div key={phase} className="space-y-6">
                                <div className="flex items-center gap-5 px-2">
                                    <span className="bg-[#d7f0ff] text-[#215387] px-4 py-1.5 rounded-full text-[10px] font-black tracking-[0.2em] shadow-sm border border-blue-50">
                                        STEP 0{phase}
                                    </span>
                                    <h3 className="font-black-jp text-slate-700 text-xl tracking-tight">
                                        {phaseLabels[phase]}
                                    </h3>
                                </div>

                                <div className="grid grid-cols-1 gap-5">
                                    {tasks.filter(t => t.phase === phase).map(task => (
                                        <TaskCard
                                            key={task.id}
                                            task={task}
                                            onToggle={() => toggleTask(task.id)}
                                            onCopy={copyToClipboard}
                                            onSendEmail={handleSendEmail}
                                        />
                                    ))}
                                </div>
                            </div>
                        ))}

                        {/* Reset */}
                        <div className="flex justify-center pt-8">
                            <button
                                onClick={() => {
                                    if (confirm('進捗をリセットしますか？')) {
                                        setTasks(initialTasks);
                                        localStorage.removeItem(STORAGE_KEY_TASKS);
                                    }
                                }}
                                className="text-slate-300 hover:text-red-400 text-[10px] font-black tracking-[0.2em] flex items-center gap-2 transition-colors"
                            >
                                <Icon name="refresh-cw" size={14} /> RESET PROGRESS
                            </button>
                        </div>
                    </main>

                    {/* ── Fixed Footer Bar ── */}
                    <div className="fixed bottom-0 left-0 right-0 p-8 sticky-report-bar z-40 border-t border-slate-100">
                        <div className="max-w-4xl mx-auto flex flex-col items-center gap-4">
                            <p className="text-[11px] font-black text-slate-400 flex items-center gap-2">
                                <Icon name="info" size={16} className="text-[#215387]" /> 本文を編集せずにそのまま送信してください
                            </p>
                            <button
                                onClick={() => {
                                    if (isAllDone) { setIsModalOpen(true); }
                                    else { alert('全てのタスクを完了させてください。'); }
                                }}
                                className={`w-full deployment-btn py-6 flex items-center justify-center gap-4 text-xl tracking-tight shadow-2xl ${isAllDone ? 'shadow-blue-900/20' : 'opacity-40 cursor-not-allowed shadow-none'}`}
                            >
                                <Icon name="send" size={24} /> 導入完了を報告する
                            </button>
                        </div>
                    </div>

                    {/* ── Final Modal ── */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 modal-overlay flex items-end md:items-center justify-center p-4">
                            <div className="bg-white w-full max-w-lg rounded-[32px] overflow-hidden shadow-2xl">
                                <div className="bg-[#f8fafc] px-10 py-8 flex justify-between items-center border-b border-slate-100">
                                    <h3 className="text-[#215387] font-black text-xl flex items-center gap-3 leading-none uppercase">
                                        <Icon name="mail" /> Final Report
                                    </h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-slate-300 hover:text-slate-600">
                                        <Icon name="x" size={32} />
                                    </button>
                                </div>
                                <div className="p-10 space-y-8">
                                    <div className="space-y-6">
                                        <p className="text-[13px] font-bold text-slate-500">連携作業に必要なRemoteLOCKアカウント情報を入力してください。</p>
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Login ID (Email)</label>
                                            <input
                                                type="email"
                                                value={formData.loginId}
                                                onChange={e => setFormData({ ...formData, loginId: e.target.value })}
                                                className="host-input w-full rounded-2xl px-6 py-4"
                                                placeholder="example@gmail.com"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Password</label>
                                            <input
                                                type="text"
                                                value={formData.password}
                                                onChange={e => setFormData({ ...formData, password: e.target.value })}
                                                className="host-input w-full rounded-2xl px-6 py-4"
                                            />
                                        </div>
                                    </div>
                                    <button
                                        onClick={() => handleSendEmail('final')}
                                        disabled={!formData.propertyName || !formData.loginId || !formData.password}
                                        className="w-full bg-[#215387] py-6 rounded-[28px] text-white font-black text-lg shadow-2xl shadow-blue-900/20 transition-all disabled:bg-slate-100 disabled:text-slate-300 active:scale-95"
                                    >
                                        メールアプリを起動
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ── Toast ── */}
                    {toastMsg && (
                        <div className="fixed bottom-32 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-3 rounded-2xl text-xs font-black shadow-2xl z-50">
                            {toastMsg}
                        </div>
                    )}
                </div>
            );
        };

        /* ─────────────────────────────────────────────────────────────────
           TaskCard: 完了状態に応じてアクションエリアを確実に制御する
           ───────────────────────────────────────────────────────────────── */
        const TaskCard = ({ task, onToggle, onCopy, onSendEmail }) => {
            const showAction = !task.completed;

            return (
                <div
                    onClick={onToggle}
                    className={`group p-8 md:p-10 transition-all duration-300 cursor-pointer flex gap-8 rounded-[32px] border card-shadow ${
                        task.completed
                            ? 'bg-[#f8fafc]/80 border-slate-100 opacity-60'
                            : task.isCritical
                                ? 'bg-[#fffcf0] border-amber-200'
                                : 'bg-white border-slate-100 hover:border-[#215387] hover:translate-y-[-2px]'
                    }`}
                >
                    {/* Checkbox */}
                    <div className="shrink-0 mt-1">
                        {task.completed
                            ? (
                                <div className="bg-[#10b981] rounded-full p-2.5 shadow-lg shadow-emerald-500/20 scale-110">
                                    <Icon name="check" size={20} className="text-white" />
                                </div>
                            ) : (
                                <div className="border-2 border-slate-200 w-10 h-10 rounded-2xl transition-all group-hover:border-[#215387] bg-slate-50"></div>
                            )
                        }
                    </div>

                    {/* Content */}
                    <div className="flex-1 min-w-0">
                        {/* Title row */}
                        <div className="flex flex-wrap items-center gap-3 mb-3">
                            <span className={`font-black-jp text-xl tracking-tight ${task.completed ? 'text-slate-300 line-through' : 'text-slate-800'}`}>
                                {task.title}
                            </span>
                            {task.isCritical && !task.completed && (
                                <span className="bg-[#ea4d3c] text-white text-[9px] px-2.5 py-1 rounded font-black tracking-widest shadow-sm">重要</span>
                            )}
                            {task.isOptional && !task.completed && (
                                <span className="bg-slate-100 text-slate-400 text-[9px] px-2.5 py-1 rounded font-black tracking-widest">任意</span>
                            )}
                        </div>

                        {/* Description */}
                        <p className={`text-[14px] leading-relaxed ${task.completed ? 'text-slate-300' : 'text-slate-500 font-medium'}`}>
                            {task.description}
                        </p>

                        {/* ── Action Area: max-height アニメーションで確実に折りたたむ ── */}
                        <div
                            className={`task-action-area ${showAction ? 'visible' : 'hidden-area'}`}
                            style={{ marginTop: showAction ? '1.5rem' : 0 }}
                        >
                            <div onClick={e => e.stopPropagation()} className="space-y-6">

                                {/* External Links */}
                                {(task.links || task.inquiryLinks) && (
                                    <div className="flex flex-wrap gap-4">
                                        {(task.inquiryLinks || []).map((l, i) => (
                                            <a key={i} href={l.url} target="_blank" rel="noreferrer"
                                               className="flex items-center gap-3 px-6 py-4 bg-white border border-slate-200 rounded-2xl font-bold text-[11px] text-slate-600 hover:border-[#215387] transition-all card-shadow">
                                                <Icon name={l.icon} size={16} className="text-[#215387]" /> {l.label}
                                            </a>
                                        ))}
                                        {(task.links || []).map((l, i) => (
                                            <a key={i} href={l.url} target="_blank" rel="noreferrer"
                                               className="inline-flex items-center gap-3 bg-[#215387] text-white text-[11px] px-8 py-4 rounded-2xl font-black hover:bg-[#1a4270] transition-all shadow-lg shadow-blue-900/10">
                                                {l.label} <Icon name="external-link" size={14} />
                                            </a>
                                        ))}
                                    </div>
                                )}

                                {/* Diagnosis Buttons */}
                                {task.showDiagnosisButtons && (
                                    <div className="p-6 bg-slate-50 rounded-[24px] border border-slate-100">
                                        <p className="text-[10px] font-black text-[#215387] uppercase tracking-widest mb-4">
                                            結果を選択してメール報告（タスク完了）
                                        </p>
                                        <div className="flex gap-4">
                                            <button
                                                onClick={() => onSendEmail('diagnosis', true)}
                                                className="flex-grow py-4 bg-white border border-blue-100 rounded-2xl text-xs font-black text-[#215387] hover:bg-[#215387] hover:text-white transition shadow-sm"
                                            >
                                                設置可能
                                            </button>
                                            <button
                                                onClick={() => onSendEmail('diagnosis', false)}
                                                className="flex-grow py-4 bg-white border border-red-100 rounded-2xl text-xs font-black text-red-500 hover:bg-red-500 hover:text-white transition shadow-sm"
                                            >
                                                設置不可
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {/* Invitation Guide */}
                                {task.showInviteGuide && (
                                    <div className="p-7 bg-white rounded-[24px] border border-slate-200 space-y-6">
                                        <div className="space-y-4">
                                            <div className="flex justify-between items-center">
                                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">招待用メールアドレス</p>
                                                <button
                                                    onClick={() => onCopy('customer@bizpato.com')}
                                                    className="text-[10px] font-black text-[#215387] uppercase tracking-widest border border-blue-100 px-3 py-1.5 rounded-lg hover:bg-blue-50 transition"
                                                >
                                                    Copy Address
                                                </button>
                                            </div>
                                            <code className="block bg-slate-50 p-4 rounded-xl font-bold text-slate-700 text-sm border border-slate-100">
                                                customer@bizpato.com
                                            </code>
                                        </div>
                                        <div className="space-y-4 pt-2">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">招待手順</p>
                                            <ul className="space-y-3">
                                                {[
                                                    'RemoteLOCK Connect 画面右上のアイコンをクリック',
                                                    '「管理者と権限タイプ」を選択してください',
                                                    '画面右側の「管理者の招待」をクリック',
                                                    '上記メールアドレスを入力し、権限タイプで「Owner」を選択',
                                                    '「管理者の招待」をクリックして送信完了です'
                                                ].map((step, idx) => (
                                                    <li key={idx} className="flex gap-3 text-xs font-bold text-slate-600 leading-relaxed">
                                                        <span className="flex-shrink-0 w-5 h-5 rounded-full bg-slate-100 text-[#215387] flex items-center justify-center text-[10px]">
                                                            {idx + 1}
                                                        </span>
                                                        {step}
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
